{% extends "base.html" %}

{% block title %}Rejestracja | Sklep Komputerowy{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card glass-card">
      <div class="card-body">
        <h1 class="h4 fw-semibold mb-3">Utworz konto</h1>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nazwa uzytkownika</label>
            <input type="text" class="form-control" name="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Haslo</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button class="btn btn-primary w-100">Zarejestruj</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
