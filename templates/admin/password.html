{% extends "base.html" %}

{% block title %}Zmien haslo admina | Panel admina{% endblock %}

{% block content %}
<h1 class="h3 fw-semibold mb-4">Zmien haslo admina</h1>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card glass-card">
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Aktualne haslo</label>
            <input type="password" class="form-control" name="current_password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Nowe haslo</label>
            <input type="password" class="form-control" name="new_password" minlength="8" required>
            <div class="form-text">Minimum 8 znakow.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Powtorz nowe haslo</label>
            <input type="password" class="form-control" name="confirm_password" minlength="8" required>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary">Zmien haslo</button>
            <a class="btn btn-outline-light" href="{{ url_for('admin_index') }}">Wroc</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
