{% extends "base.html" %}

{% block title %}{% if product %}Edytuj produkt{% else %}Nowy produkt{% endif %} | Panel admina{% endblock %}

{% block content %}
<h1 class="h3 fw-semibold mb-4">{% if product %}Edytuj produkt{% else %}Nowy produkt{% endif %}</h1>

<div class="card glass-card">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Nazwa</label>
        <input type="text" class="form-control" name="name" value="{{ product.name if product else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Opis</label>
        <textarea class="form-control" name="description" rows="4" required>{{ product.description if product else '' }}</textarea>
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Cena (zl)</label>
          <input type="number" class="form-control" name="price" step="0.01" min="0" value="{{ '%.2f'|format(product.price_cents / 100) if product else '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Magazyn</label>
          <input type="number" class="form-control" name="stock" min="0" value="{{ product.stock if product else 0 }}" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">URL zdjecia</label>
          <input type="text" class="form-control" name="image_url" value="{{ product.image_url if product else '' }}">
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary">Zapisz</button>
        <a class="btn btn-outline-light" href="{{ url_for('admin_products') }}">Anuluj</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
