{% extends "base.html" %}

{% block title %}{{ product.name }} | Sklep Komputerowy{% endblock %}

{% block content %}
<div class="row g-4">
  <div class="col-lg-6">
    <div class="product-hero">
      <img src="{{ product.image_url or 'https://placehold.co/800x600?text=Komponent' }}" alt="{{ product.name }}">
    </div>
  </div>
  <div class="col-lg-6">
    <h1 class="h2 fw-semibold product-title">{{ product.name }}</h1>
    <p class="product-desc">{{ product.description }}</p>
    <div class="price-lg">{{ format_price(product.price_cents) }}</div>
    <p class="mt-3">Magazyn: <strong>{{ product.stock }}</strong> szt.</p>

    <form method="post" action="{{ url_for('cart_add', product_id=product.id) }}" class="d-flex flex-column flex-sm-row gap-2 mt-4">
      <input type="number" class="form-control" name="quantity" min="1" max="{{ product.stock }}" value="1" {% if product.stock <= 0 %}disabled{% endif %}>
      <button class="btn btn-primary" {% if product.stock <= 0 %}disabled{% endif %}>Dodaj do koszyka</button>
    </form>
  </div>
</div>
{% endblock %}
